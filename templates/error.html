{% extends "layout.html" %}

{% block title %}
    Error
{% endblock %}

{% block main %}

    <img
        alt="Error {{ top }}"
        class="img-fluid mt-4 bg_img"
        src="/static/images/error_illustration.png"
    >
    <h2 class="mt-3" style="color: #F06292;">Error {{ top }}</h2>
    <h1 class="mt-1">{{ bottom }}</h1>
    <button onclick="window.history.back()" class="btn dark_btn mt-3">Go Back</button>

{% endblock %}
